<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>云蝠控股 · 组织架构图</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:20px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#fff;border-radius:12px;border:0.5px solid #e0dfd8;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:9px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#3C3489}
.hdr-title{font-size:15px;font-weight:600;color:#1a1a18}
.hdr-sub{font-size:12px;color:#888780;margin-top:1px}
.btn{padding:6px 13px;font-size:13px;border:0.5px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a18;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:#f5f5f0}
.btn.primary{background:#534AB7;color:#fff;border-color:#534AB7}
.btn.primary:hover{background:#3C3489}
.btn.sm{padding:3px 9px;font-size:12px}
.btn.danger{background:#a32d2d;color:#fff;border-color:#a32d2d}
.btn.danger:hover{background:#791F1F}
.legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#888780}
.leg-dot{width:10px;height:10px;border-radius:3px}
.chart-wrap{background:#fff;border-radius:12px;border:0.5px solid #e0dfd8;padding:20px;margin-bottom:14px;overflow-x:auto}
.node-group{cursor:pointer}
.node-group rect.node-rect{transition:stroke-width .1s}
.node-group:hover rect.node-rect{stroke-width:1.5!important}
.node-group.active rect.node-rect{stroke-width:2!important}
.detail-panel{background:#fff;border-radius:12px;border:0.5px solid #e0dfd8;overflow:hidden;display:none;margin-bottom:14px}
.detail-panel.open{display:block}
.detail-hdr{padding:14px 20px;border-bottom:0.5px solid #e0dfd8;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.detail-title{font-size:17px;font-weight:600}
.detail-sub{font-size:13px;color:#888780;margin-top:2px}
.chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
.kpi-row{display:flex;gap:10px;padding:12px 20px;border-bottom:0.5px solid #e0dfd8;flex-wrap:wrap}
.kpi{background:#fafaf8;border-radius:8px;padding:10px 14px;min-width:110px}
.kpi-l{font-size:11px;color:#888780;margin-bottom:2px}
.kpi-v{font-size:19px;font-weight:600;color:#1a1a18}
.people-section{padding:16px 20px}
.level-block{margin-bottom:18px}
.level-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.level-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;min-width:38px;text-align:center}
.level-name{font-size:13px;color:#888780}
.level-count{font-size:12px;color:#b4b2a9;margin-left:auto}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.person-card{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:8px;border:0.5px solid #e0dfd8;background:#fff;position:relative}
.person-card:hover{border-color:#d3d1c7}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.person-info{flex:1;min-width:0}
.person-name{font-size:13px;font-weight:500;color:#1a1a18}
.person-role{font-size:11px;color:#888780;margin-top:1px}
.person-sub{font-size:11px;color:#b4b2a9;margin-top:1px}
.card-btns{display:none;gap:3px;position:absolute;top:6px;right:6px}
.person-card:hover .card-btns{display:flex}
.icon-btn{width:22px;height:22px;border-radius:5px;border:0.5px solid #d3d1c7;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#888780}
.icon-btn:hover{background:#f5f5f0}
.icon-btn.del:hover{background:#fcebeb;color:#a32d2d;border-color:#e24b4a}
.icon-btn.transfer:hover{background:#E6F1FB;color:#0C447C;border-color:#378ADD}
.icon-btn.level:hover{background:#FAEEDA;color:#854F0B;border-color:#EF9F27}
.icon-btn.leave:hover{background:#fcebeb;color:#a32d2d;border-color:#e24b4a}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#fff;border-radius:14px;border:0.5px solid #e0dfd8;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.modal .info-line{font-size:12px;color:#888780;background:#fafaf8;padding:8px 11px;border-radius:8px;margin-bottom:14px;border:0.5px solid #e0dfd8}
.field{margin-bottom:12px}
.field label{font-size:12px;color:#888780;display:block;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:7px 11px;font-size:13px;border:0.5px solid #d3d1c7;border-radius:8px;background:#fafaf8;color:#1a1a18;outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#534AB7;background:#fff}
.field textarea{resize:vertical;min-height:50px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.saved-tip{font-size:12px;padding:3px 10px;border-radius:6px;opacity:0;transition:opacity .3s}
.saved-tip.show{opacity:1}
.saved-tip.success{color:#0F6E56;background:#E1F5EE}
.saved-tip.error{color:#a32d2d;background:#fcebeb}
.saved-tip.loading{color:#854F0B;background:#FAEEDA}
.close-btn{width:28px;height:28px;border-radius:7px;border:0.5px solid #d3d1c7;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#888780}
.close-btn:hover{background:#f5f5f0}
.archive-wrap{background:#fff;border-radius:12px;border:0.5px solid #e0dfd8;margin-bottom:14px;overflow:hidden}
.archive-hdr{padding:12px 20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.archive-hdr:hover{background:#fafaf8}
.archive-title{font-size:14px;font-weight:600;color:#5F5E5A}
.archive-toggle{font-size:12px;color:#888780}
.archive-body{padding:0 20px 16px;display:none}
.archive-body.show{display:block}
.archive-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#fafaf8;border:0.5px solid #e0dfd8;border-radius:8px;margin-bottom:6px;font-size:12px;color:#5F5E5A;flex-wrap:wrap;gap:8px}
.archive-info{flex:1;min-width:200px}
.archive-info strong{color:#1a1a18;font-weight:600}
.archive-meta{color:#888780;margin-top:3px;line-height:1.5}
.hr-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 9px;border-radius:6px;background:#E1F5EE;color:#0F6E56;font-weight:500}
.hr-badge.locked{background:#f1efe8;color:#888780}
.loading-screen{position:fixed;inset:0;background:#f5f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
.loading-screen.hide{display:none}
.spinner{width:32px;height:32px;border:3px solid #e0dfd8;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#888780}
.error-screen{position:fixed;inset:0;background:#f5f5f0;display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}
.error-screen.show{display:flex}
.error-box{background:#fff;border:1px solid #e24b4a;border-radius:12px;padding:24px;max-width:480px;text-align:center}
.error-box h3{color:#a32d2d;margin-bottom:10px}
.error-box p{font-size:13px;color:#5F5E5A;line-height:1.6}
@media(max-width:600px){.people-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">正在从云端加载组织架构数据...</div>
</div>

<div class="error-screen" id="error-screen">
  <div class="error-box">
    <h3>⚠️ 加载失败</h3>
    <p id="error-msg">无法连接到云端数据库，请检查网络连接。</p>
    <p style="margin-top:10px;font-size:12px;color:#888780">如果反复出现此错误，请联系管理员检查 Supabase 配置。</p>
    <button class="btn primary" style="margin-top:14px" onclick="location.reload()">重新加载</button>
  </div>
</div>

<div class="page" id="main-page" style="display:none">
<div class="hdr">
  <div class="hdr-left">
    <div class="logo">云</div>
    <div>
      <div class="hdr-title">云蝠控股 · 组织架构图</div>
      <div class="hdr-sub" id="hdr-sub">点击部门节点 · 查看职级分布</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <span class="saved-tip" id="saved-tip">已保存</span>
    <span class="hr-badge locked" id="hr-badge" onclick="openLoginModal()" style="cursor:pointer">🔒 HR 登录</span>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#534AB7"></div>核心/总部</div>
      <div class="leg-item"><div class="leg-dot" style="background:#0F6E56"></div>职能</div>
      <div class="leg-item"><div class="leg-dot" style="background:#854F0B"></div>研发</div>
    </div>
  </div>
</div>

<div class="chart-wrap">
  <svg id="org-svg" width="100%" viewBox="0 0 1060 310"></svg>
</div>

<div class="detail-panel" id="detail-panel">
  <div class="detail-hdr">
    <div>
      <div class="detail-title" id="d-title"></div>
      <div class="detail-sub" id="d-sub"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div id="d-chips"></div>
      <button class="btn sm primary hr-only" onclick="openAddPerson()" style="display:none">+ 添加人员</button>
      <div class="close-btn" onclick="closeDetail()">✕</div>
    </div>
  </div>
  <div class="kpi-row" id="d-kpis"></div>
  <div class="people-section" id="d-people"></div>
</div>

<div class="archive-wrap">
  <div class="archive-hdr" onclick="toggleArchive()">
    <div class="archive-title">📁 已离职归档 (<span id="archive-count">0</span>)</div>
    <div class="archive-toggle" id="archive-toggle">展开 ▼</div>
  </div>
  <div class="archive-body" id="archive-body"></div>
</div>

</div>

<div class="overlay" id="modal-login" style="display:none">
  <div class="modal">
    <h3>🔐 HR 口令登录</h3>
    <div class="info-line">普通查看不需要登录。输入 HR 口令后才能进行入转调离等编辑操作。</div>
    <div class="field">
      <label>HR 口令</label>
      <input type="password" id="login-password" placeholder="请输入口令" autofocus/>
    </div>
    <div id="login-error" style="color:#a32d2d;font-size:12px;margin-bottom:10px;display:none"></div>
    <div class="modal-btns">
      <button class="btn primary" onclick="doLogin()">登录</button>
      <button class="btn" onclick="closeModal('modal-login')">取消</button>
    </div>
    <div style="margin-top:14px;font-size:11px;color:#888780;border-top:0.5px solid #e0dfd8;padding-top:10px">
      <strong>已登录 HR？</strong> 可以
      <a href="#" onclick="openChangePassword();return false;" style="color:#534AB7">修改口令</a>
    </div>
  </div>
</div>

<div class="overlay" id="modal-changepw" style="display:none">
  <div class="modal">
    <h3>🔑 修改 HR 口令</h3>
    <div class="info-line">建议每月更换一次口令，提升数据安全性。</div>
    <div class="field">
      <label>当前口令</label>
      <input type="password" id="cpw-old" placeholder="当前 HR 口令"/>
    </div>
    <div class="field">
      <label>新口令</label>
      <input type="password" id="cpw-new" placeholder="新口令（建议 6 位以上）"/>
    </div>
    <div class="field">
      <label>再次输入新口令</label>
      <input type="password" id="cpw-confirm" placeholder="再次确认"/>
    </div>
    <div id="cpw-error" style="color:#a32d2d;font-size:12px;margin-bottom:10px;display:none"></div>
    <div class="modal-btns">
      <button class="btn primary" onclick="doChangePassword()">确认修改</button>
      <button class="btn" onclick="closeModal('modal-changepw')">取消</button>
    </div>
  </div>
</div>

<div class="overlay" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-title">添加人员</h3>
    <div class="field"><label>姓名</label><input id="f-name" placeholder="请输入姓名"/></div>
    <div class="field"><label>职务/岗位</label><input id="f-role" placeholder="如：财务总监"/></div>
    <div class="field"><label>职级</label>
      <select id="f-level">
        <option value="M1">M1 — 董事长/总经理</option>
        <option value="M2">M2 — 副总</option>
        <option value="M3">M3 — 总监</option>
        <option value="M4">M4 — 部门经理/总监</option>
        <option value="M5">M5 — 部门经理</option>
        <option value="M6">M6 — 部门主管</option>
        <option value="M7" selected>M7 — 高级专员</option>
        <option value="M8">M8 — 专员</option>
        <option value="-">无职级（一线员工）</option>
      </select>
    </div>
    <div class="field"><label>所属二级部门</label><input id="f-sub" placeholder="如：财务部（可留空）"/></div>
    <div class="modal-btns">
      <button class="btn primary" onclick="confirmPerson()">确认</button>
      <button class="btn" onclick="closeModal('modal')">取消</button>
    </div>
  </div>
</div>

<div class="overlay" id="modal-transfer" style="display:none">
  <div class="modal">
    <h3>📋 调岗</h3>
    <div class="info-line" id="t-info"></div>
    <div class="field"><label>调入部门</label>
      <select id="t-dept"></select>
    </div>
    <div class="field"><label>新二级部门（可选）</label>
      <input id="t-sub" placeholder="留空则使用原二级部门"/>
    </div>
    <div class="field"><label>新职务（可选）</label>
      <input id="t-role" placeholder="留空则保持原职务"/>
    </div>
    <div class="field"><label>调岗备注</label>
      <textarea id="t-note" placeholder="例如：业务调整、内部轮岗"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn primary" onclick="confirmTransfer()">确认调岗</button>
      <button class="btn" onclick="closeModal('modal-transfer')">取消</button>
    </div>
  </div>
</div>

<div class="overlay" id="modal-level" style="display:none">
  <div class="modal">
    <h3>🎖 改职级</h3>
    <div class="info-line" id="l-info"></div>
    <div class="field"><label>新职级</label>
      <select id="l-level">
        <option value="M1">M1 — 董事长/总经理</option>
        <option value="M2">M2 — 副总</option>
        <option value="M3">M3 — 总监</option>
        <option value="M4">M4 — 部门经理/总监</option>
        <option value="M5">M5 — 部门经理</option>
        <option value="M6">M6 — 部门主管</option>
        <option value="M7">M7 — 高级专员</option>
        <option value="M8">M8 — 专员</option>
        <option value="-">无职级（一线员工）</option>
      </select>
    </div>
    <div class="field"><label>变更原因</label>
      <textarea id="l-note" placeholder="例如：年度晋升、降级处理"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn primary" onclick="confirmLevel()">确认变更</button>
      <button class="btn" onclick="closeModal('modal-level')">取消</button>
    </div>
  </div>
</div>

<div class="overlay" id="modal-leave" style="display:none">
  <div class="modal">
    <h3>🚪 办理离职</h3>
    <div class="info-line" id="q-info"></div>
    <div class="field"><label>离职日期</label>
      <input type="date" id="q-date"/>
    </div>
    <div class="field"><label>离职原因</label>
      <select id="q-reason">
        <option value="主动离职">主动离职</option>
        <option value="合同到期">合同到期</option>
        <option value="协商解除">协商解除</option>
        <option value="辞退">辞退</option>
        <option value="退休">退休</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="field"><label>备注</label>
      <textarea id="q-note" placeholder="例如：交接人、未结事项"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn danger" onclick="confirmLeave()">确认离职</button>
      <button class="btn" onclick="closeModal('modal-leave')">取消</button>
    </div>
  </div>
</div>
<script>
// =========================================================
// ⚠️ 配置区：填你自己的 Supabase 信息
// =========================================================
const SUPABASE_URL = 'https://jybhgnirqpwbdezixirx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_GYQtIU2KB7BeOZfqtQtDYA_UbjS-zJC';
// =========================================================

const LEVEL_META={
  M1:{label:'M1',bg:'#26215C',tc:'#EEEDFE',name:'董事长/总经理'},
  M2:{label:'M2',bg:'#3C3489',tc:'#EEEDFE',name:'副总'},
  M3:{label:'M3',bg:'#534AB7',tc:'#EEEDFE',name:'总监'},
  M4:{label:'M4',bg:'#7F77DD',tc:'#fff',name:'部门经理/总监'},
  M5:{label:'M5',bg:'#AFA9EC',tc:'#26215C',name:'部门经理'},
  M6:{label:'M6',bg:'#CECBF6',tc:'#3C3489',name:'部门主管'},
  M7:{label:'M7',bg:'#E1F5EE',tc:'#085041',name:'高级专员'},
  M8:{label:'M8',bg:'#f1efe8',tc:'#5F5E5A',name:'专员'},
  '-':{label:'—',bg:'#f1efe8',tc:'#888780',name:'一线员工'},
};
const LEVEL_ORDER=['M1','M2','M3','M4','M5','M6','M7','M8','-'];

let sb = null;
let DATA = [];
let ARCHIVE = [];
let activeId = null;
let editPid = null, editDid = null;
let pidCounter = 9000;
let actionDid = null, actionPid = null;
let isHR = false;

const AC=['#EEEDFE','#E1F5EE','#FAEEDA','#FAECE7','#E6F1FB','#EAF3DE'];
const ATC=['#3C3489','#085041','#633806','#712B13','#0C447C','#27500A'];
function ac(i){return AC[Math.abs(i)%AC.length];}
function atc(i){return ATC[Math.abs(i)%ATC.length];}
function today(){return new Date().toISOString().slice(0,10);}

function showTip(msg, type){
  const t=document.getElementById('saved-tip');
  t.textContent=msg;
  t.className='saved-tip show '+(type||'success');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function showError(msg){
  document.getElementById('error-msg').textContent=msg;
  document.getElementById('loading-screen').classList.add('hide');
  document.getElementById('error-screen').classList.add('show');
}

async function init(){
  if (SUPABASE_URL.indexOf('Project URL') !== -1 || SUPABASE_KEY.indexOf('Publishable Key') !== -1) {
    showError('请先在 HTML 文件顶部填入 Supabase 的 URL 和 Key，再上传到 GitHub。');
    return;
  }
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadAll();
    document.getElementById('loading-screen').classList.add('hide');
    document.getElementById('main-page').style.display='block';
    drawSVG();
    renderArchive();
    updateHRBadge();
  } catch(e) {
    console.error(e);
    showError('连接失败：' + (e.message || e));
  }
}

async function loadAll(){
  const { data: depts, error: e1 } = await sb.from('departments').select('*').order('sort_order');
  if (e1) throw e1;
  const { data: emps, error: e2 } = await sb.from('employees').select('*');
  if (e2) throw e2;
  const { data: arch, error: e3 } = await sb.from('archived_employees').select('*').order('archived_at',{ascending:false});
  if (e3) throw e3;

  DATA = depts.map(d => ({
    ...d,
    people: emps.filter(p => p.dept_id === d.id).map(p => ({
      id: p.id, name: p.name, role: p.role, level: p.level, sub: p.sub,
      lastTransfer: p.last_transfer, lastLevelChange: p.last_level_change
    }))
  }));
  ARCHIVE = arch.map(p => ({
    id: p.id, name: p.name, role: p.role, level: p.level, sub: p.sub,
    fromDeptId: p.from_dept_id, fromDeptName: p.from_dept_name,
    leaveDate: p.leave_date, leaveReason: p.leave_reason, leaveNote: p.leave_note,
    joinDate: p.join_date
  }));
}

async function doLogin(){
  const pwd = document.getElementById('login-password').value;
  if (!pwd) return;
  try {
    const { data, error } = await sb.from('app_config').select('value').eq('key','hr_password').single();
    if (error) throw error;
    if (data.value === pwd){
      isHR = true;
      closeModal('modal-login');
      updateHRBadge();
      showTip('✓ HR 登录成功','success');
    } else {
      const err = document.getElementById('login-error');
      err.textContent='口令错误，请重新输入';
      err.style.display='block';
    }
  } catch(e){
    document.getElementById('login-error').textContent='验证失败：'+(e.message||e);
    document.getElementById('login-error').style.display='block';
  }
}

function logout(){
  if (!confirm('确定要注销 HR 登录吗？')) return;
  isHR = false;
  updateHRBadge();
  showTip('已注销 HR 登录','success');
}

async function doChangePassword(){
  const oldPw = document.getElementById('cpw-old').value;
  const newPw = document.getElementById('cpw-new').value;
  const confirmPw = document.getElementById('cpw-confirm').value;
  const err = document.getElementById('cpw-error');
  err.style.display='none';

  if (!oldPw||!newPw||!confirmPw){err.textContent='请填写所有字段';err.style.display='block';return;}
  if (newPw.length<4){err.textContent='新口令至少 4 位';err.style.display='block';return;}
  if (newPw!==confirmPw){err.textContent='两次输入的新口令不一致';err.style.display='block';return;}

  try {
    const { data: cur } = await sb.from('app_config').select('value').eq('key','hr_password').single();
    if (cur.value !== oldPw){err.textContent='当前口令错误';err.style.display='block';return;}
    await sb.from('app_config').update({value: newPw, updated_at: new Date().toISOString()}).eq('key','hr_password');
    await sb.from('app_config').update({value: new Date().toISOString(), updated_at: new Date().toISOString()}).eq('key','password_changed_at');
    closeModal('modal-changepw');
    showTip('✓ 口令已更新','success');
  } catch(e){
    err.textContent='更新失败：'+(e.message||e);
    err.style.display='block';
  }
}

}

function drawSVG(){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.getElementById('org-svg');
  svg.innerHTML='';
  function mkRect(x,y,w,h,rx2,fill,stroke,sw){
    const r=document.createElementNS(ns,'rect');
    [['x',x],['y',y],['width',w],['height',h],['rx',rx2],['fill',fill],['stroke',stroke],['stroke-width',sw||'0.5']].forEach(([a,v])=>r.setAttribute(a,v));
    return r;
  }
  function mkText(x,y,txt,fs,fw,fill){
    const t=document.createElementNS(ns,'text');
    [['x',x],['y',y],['text-anchor','middle'],['font-size',fs],['font-weight',fw||'400'],['fill',fill],['font-family','-apple-system,sans-serif']].forEach(([a,v])=>t.setAttribute(a,v));
    t.textContent=txt;return t;
  }
  function mkLine(x1,y1,x2,y2){
    const l=document.createElementNS(ns,'line');
    [['x1',x1],['y1',y1],['x2',x2],['y2',y2],['stroke','#d3d1c7'],['stroke-width','1']].forEach(([a,v])=>l.setAttribute(a,v));
    return l;
  }
  function mkPath(d){
    const p=document.createElementNS(ns,'path');
    p.setAttribute('d',d);p.setAttribute('fill','none');p.setAttribute('stroke','#d3d1c7');p.setAttribute('stroke-width','1');
    return p;
  }
  const liveTotal=DATA.reduce((s,d)=>s+(d.count||0),0);
  const rx=470,ry=18,rw=120,rh=46;
  const rootG=document.createElementNS(ns,'g');
  rootG.appendChild(mkRect(rx,ry,rw,rh,'9','#EEEDFE','#534AB7','1'));
  rootG.appendChild(mkText(rx+rw/2,ry+17,'云蝠控股','13','600','#3C3489'));
  rootG.appendChild(mkText(rx+rw/2,ry+33,liveTotal+'人','11','400','#534AB7'));
  svg.appendChild(rootG);
  const NW=90,NH=46,NY1=158,NY2=228;
  const row1=DATA.slice(0,6);
  const row2=DATA.slice(6);
  const r1xs=[20,115,210,305,400,495];
  const r2xs=[590,685,780,875,970];
  const rootMX=rx+rw/2;
  if(row1.length>0){
    svg.appendChild(mkLine(r1xs[0]+NW/2,NY1-20,r1xs[Math.min(row1.length-1,5)]+NW/2,NY1-20));
    svg.appendChild(mkLine(rootMX,ry+rh,rootMX,NY1-20));
  }
  if(row2.length>0){
    const r2start=r2xs[0]+NW/2;
    const r2end=r2xs[Math.min(row2.length-1,4)]+NW/2;
    const r2mid=(r2start+r2end)/2;
    svg.appendChild(mkLine(r2start,NY2-20,r2end,NY2-20));
    svg.appendChild(mkPath(`M${rootMX},${ry+rh} C${rootMX},${NY2-50} ${r2mid},${NY2-50} ${r2mid},${NY2-20}`));
  }
  row1.forEach((d,i)=>{
    const x=r1xs[i],cx=x+NW/2;
    svg.appendChild(mkLine(cx,NY1-20,cx,NY1));
    const g=document.createElementNS(ns,'g');
    g.setAttribute('class','node-group');
    g.setAttribute('data-id',d.id);
    const r=mkRect(x,NY1,NW,NH,'8',d.bg,d.bar,'0.5');
    r.setAttribute('class','node-rect');
    g.appendChild(r);
    g.appendChild(mkText(x+NW/2,NY1+17,d.name,'12','500',d.tc));
    g.appendChild(mkText(x+NW/2,NY1+33,d.count+'人','10','400',d.bar));
    g.addEventListener('click',()=>showDetail(d.id));
    svg.appendChild(g);
  });
  row2.forEach((d,i)=>{
    const x=r2xs[i],cx=x+NW/2;
    svg.appendChild(mkLine(cx,NY2-20,cx,NY2));
    const g=document.createElementNS(ns,'g');
    g.setAttribute('class','node-group');
    g.setAttribute('data-id',d.id);
    const r=mkRect(x,NY2,NW,NH,'8',d.bg,d.bar,'0.5');
    r.setAttribute('class','node-rect');
    g.appendChild(r);
    g.appendChild(mkText(x+NW/2,NY2+17,d.name,'12','500',d.tc));
    g.appendChild(mkText(x+NW/2,NY2+33,d.count+'人','10','400',d.bar));
    g.addEventListener('click',()=>showDetail(d.id));
    svg.appendChild(g);
  });
}
function showDetail(id){
  activeId=id;
  const d=DATA.find(x=>x.id===id);
  if(!d)return;
  document.querySelectorAll('.node-group').forEach(g=>{
    const active=g.dataset.id===id;
    g.classList.toggle('active',active);
    const r=g.querySelector('rect.node-rect');
    if(r)r.setAttribute('stroke-width',active?'2':'0.5');
  });
  const TOTAL=DATA.reduce((s,d)=>s+(d.count||0),0);
  const rank=[...DATA].sort((a,b)=>(b.count||0)-(a.count||0)).findIndex(x=>x.id===id)+1;
  const mgrs=d.people.filter(p=>['M1','M2','M3','M4'].includes(p.level)).length;
  document.getElementById('d-title').textContent=d.name;
  document.getElementById('d-sub').textContent=(d.en||'')+(d.note?' · '+d.note:'');
  document.getElementById('d-chips').innerHTML=`<span class="chip" style="background:${d.bg};color:${d.tc}">${d.type}</span><span class="chip" style="background:#f1efe8;color:#5F5E5A;margin-left:5px">规模 #${rank}</span>`;
  document.getElementById('d-kpis').innerHTML=`
    <div class="kpi"><div class="kpi-l">在编人数</div><div class="kpi-v">${d.count}</div></div>
    <div class="kpi"><div class="kpi-l">占总人数</div><div class="kpi-v">${TOTAL?(d.count/TOTAL*100).toFixed(1):0}%</div></div>
    <div class="kpi"><div class="kpi-l">管理层 M1-M4</div><div class="kpi-v">${mgrs}人</div></div>
    <div class="kpi"><div class="kpi-l">录入人员</div><div class="kpi-v">${d.people.length}</div></div>`;
  document.querySelectorAll('.detail-panel .hr-only').forEach(el => el.style.display = isHR ? '' : 'none');
  renderPeople(d);
  const panel=document.getElementById('detail-panel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderPeople(d){
  const grouped={};
  LEVEL_ORDER.forEach(l=>grouped[l]=[]);
  d.people.forEach(p=>{const l=p.level||'-';if(!grouped[l])grouped[l]=[];grouped[l].push(p);});
  let html='';
  LEVEL_ORDER.forEach(l=>{
    const ppl=grouped[l];
    if(!ppl||ppl.length===0)return;
    const m=LEVEL_META[l]||LEVEL_META['-'];
    html+=`<div class="level-block">
      <div class="level-hdr">
        <span class="level-badge" style="background:${m.bg};color:${m.tc}">${m.label}</span>
        <span class="level-name">${m.name}</span>
        <span class="level-count">${ppl.length}人</span>
      </div>
      <div class="people-grid">
        ${ppl.map((p,pi)=>`
          <div class="person-card">
            <div class="avatar" style="background:${ac(pi)};color:${atc(pi)}">${p.name[0]||'?'}</div>
            <div class="person-info">
              <div class="person-name">${p.name}</div>
              <div class="person-role">${p.role||''}</div>
              ${p.sub?`<div class="person-sub">${p.sub}</div>`:''}
            </div>
            ${isHR?`<div class="card-btns">
              <div class="icon-btn transfer" onclick="openTransfer('${d.id}','${p.id}')" title="调岗">📋</div>
              <div class="icon-btn level" onclick="openLevel('${d.id}','${p.id}')" title="改职级">🎖</div>
              <div class="icon-btn leave" onclick="openLeave('${d.id}','${p.id}')" title="办理离职">🚪</div>
              <div class="icon-btn" onclick="openEditPerson('${d.id}','${p.id}')" title="编辑">✎</div>
              <div class="icon-btn del" onclick="deletePerson('${d.id}','${p.id}')" title="删除">✕</div>
            </div>`:''}
          </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('d-people').innerHTML=html;
}

async function confirmPerson(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('请输入姓名');return;}
  const d=DATA.find(x=>x.id===editDid);
  if(!d)return;
  const role=document.getElementById('f-role').value.trim();
  const level=document.getElementById('f-level').value;
  const sub=document.getElementById('f-sub').value.trim();
  showTip('正在保存...','loading');
  try{
    if(editPid){
      await sb.from('employees').update({name,role,level,sub,updated_at:new Date().toISOString()}).eq('id',editPid);
      const p=d.people.find(x=>x.id===editPid);
      Object.assign(p,{name,role,level,sub});
      await logActivity('edit',name,{deptId:editDid,changes:{name,role,level,sub}});
    } else {
      const newId='p'+Date.now();
      await sb.from('employees').insert({id:newId,dept_id:editDid,name,role,level,sub,join_date:today()});
      await sb.from('departments').update({count:(d.count||0)+1}).eq('id',editDid);
      d.people.push({id:newId,name,role,level,sub});
      d.count=(d.count||0)+1;
      await logActivity('add',name,{deptId:editDid,deptName:d.name,role,level});
    }
    closeModal('modal');showDetail(editDid);drawSVG();
    showTip('✓ 已保存','success');
  }catch(e){showTip('保存失败:'+(e.message||e),'error');console.error(e);}
}

async function deletePerson(did,pid){
  if(!requireHR())return;
  const d=DATA.find(x=>x.id===did);
  if(!d)return;
  const p=d.people.find(x=>x.id===pid);
  if(!p||!confirm(`确定删除「${p.name}」吗？\n（永久删除，不会进归档区。如要保留记录请用"办理离职"。）`))return;
  showTip('正在删除...','loading');
  try{
    await sb.from('employees').delete().eq('id',pid);
    const newCount=Math.max(0,(d.count||0)-1);
    await sb.from('departments').update({count:newCount}).eq('id',did);
    d.people=d.people.filter(x=>x.id!==pid);
    d.count=newCount;
    await logActivity('delete',p.name,{deptId:did,reason:'永久删除'});
    showDetail(did);drawSVG();
    showTip('✓ 已删除','success');
  }catch(e){showTip('删除失败:'+(e.message||e),'error');console.error(e);}
}

async function confirmTransfer(){
  const fromD=DATA.find(x=>x.id===actionDid);
  const newDid=document.getElementById('t-dept').value;
  const toD=DATA.find(x=>x.id===newDid);
  if(!fromD||!toD||fromD.id===toD.id){alert('请选择不同的部门');return;}
  const p=fromD.people.find(x=>x.id===actionPid);
  if(!p)return;
  const newSub=document.getElementById('t-sub').value.trim();
  const newRole=document.getElementById('t-role').value.trim();
  const note=document.getElementById('t-note').value.trim();
  const transferRecord={from:fromD.name,to:toD.name,date:today(),note};
  showTip('正在保存...','loading');
  try{
    const updates={dept_id:newDid,last_transfer:transferRecord,updated_at:new Date().toISOString()};
    if(newSub)updates.sub=newSub;
    if(newRole)updates.role=newRole;
    await sb.from('employees').update(updates).eq('id',actionPid);
    await sb.from('departments').update({count:Math.max(0,(fromD.count||0)-1)}).eq('id',fromD.id);
    await sb.from('departments').update({count:(toD.count||0)+1}).eq('id',toD.id);
    fromD.people=fromD.people.filter(x=>x.id!==actionPid);
    fromD.count=Math.max(0,(fromD.count||0)-1);
    if(newSub)p.sub=newSub;
    if(newRole)p.role=newRole;
    p.lastTransfer=transferRecord;
    toD.people.push(p);
    toD.count=(toD.count||0)+1;
    await logActivity('transfer',p.name,transferRecord);
    closeModal('modal-transfer');showDetail(toD.id);drawSVG();
    showTip('✓ 调岗完成','success');

        <strong>${p.name}</strong> · ${p.role||'-'} · ${p.level||'-'}
        <div class="archive-meta">
          原部门：${p.fromDeptName}${p.sub?' / '+p.sub:''} ·
          离职日期：${p.leaveDate} ·
          原因：${p.leaveReason}
          ${p.leaveNote?'<br>备注：'+p.leaveNote:''}
        </div>
      </div>
      ${isHR?`<div style="display:flex;gap:6px">
        <button class="btn sm" onclick="restoreArchive(${idx})">↩ 恢复</button>
        <button class="btn sm danger" onclick="deleteArchive(${idx})">永久删除</button>
      </div>`:''}
    </div>
  `).join('');
}

async function restoreArchive(idx){
  if(!requireHR())return;
  const p=ARCHIVE[idx];
  if(!p)return;
  if(!confirm(`确定恢复「${p.name}」到原部门「${p.fromDeptName}」？\n该部门人数将 +1`))return;
  const d=DATA.find(x=>x.id===p.fromDeptId);
  if(!d){alert('原部门已不存在，无法恢复');return;}
  showTip('正在恢复...','loading');
  try{
    await sb.from('employees').insert({id:p.id,dept_id:d.id,name:p.name,role:p.role,level:p.level,sub:p.sub});
    await sb.from('archived_employees').delete().eq('id',p.id);
    await sb.from('departments').update({count:(d.count||0)+1}).eq('id',d.id);
    d.people.push({id:p.id,name:p.name,role:p.role,level:p.level,sub:p.sub});
    d.count=(d.count||0)+1;
    ARCHIVE.splice(idx,1);
    await logActivity('restore',p.name,{deptName:d.name});
    drawSVG();renderArchive();
    if(activeId===d.id)showDetail(d.id);
    showTip('✓ 已恢复到「'+d.name+'」','success');
  }catch(e){showTip('恢复失败:'+(e.message||e),'error');console.error(e);}
}

async function deleteArchive(idx){
  if(!requireHR())return;
  const p=ARCHIVE[idx];
  if(!p)return;
  if(!confirm(`永久删除「${p.name}」的离职记录？\n此操作不可恢复。`))return;
  showTip('正在删除...','loading');
  try{
    await sb.from('archived_employees').delete().eq('id',p.id);
    ARCHIVE.splice(idx,1);
    renderArchive();
    showTip('✓ 已永久删除','success');
  }catch(e){showTip('删除失败:'+(e.message||e),'error');console.error(e);}
}

function toggleArchive(){
  const body=document.getElementById('archive-body');
  const tog=document.getElementById('archive-toggle');
  body.classList.toggle('show');
  tog.textContent=body.classList.contains('show')?'收起 ▲':'展开 ▼';
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.node-group').forEach(g=>{g.classList.remove('active');const r=g.querySelector('rect.node-rect');if(r)r.setAttribute('stroke-width','0.5');});
  activeId=null;
}

function closeModal(id){document.getElementById(id||'modal').style.display='none';}

['modal','modal-transfer','modal-level','modal-leave','modal-login','modal-changepw'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});

document.getElementById('login-password').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

init();
</script>
</body>
</html>
