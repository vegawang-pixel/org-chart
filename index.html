<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>云蝠控股 · 组织架构图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:20px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#fff;border-radius:12px;border:0.5px solid #e0dfd8;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:9px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#3C3489}
.hdr-title{font-size:15px;font-weight:600;color:#1a1a18}
.hdr-sub{font-size:12px;color:#888780;margin-top:1px}
.btn{padding:6px 13px;font-size:13px;border:0.5px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a18;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:#f5f5f0}
.btn.primary{background:#534AB7;color:#fff;border-color:#534AB7}
.btn.primary:hover{background:#3C3489}
.btn.sm{padding:3px 9px;font-size:12px}
.btn.danger{border-color:#e24b4a;color:#a32d2d}
.btn.danger:hover{background:#fcebeb}
.legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#888780}
.leg-dot{width:10px;height:10px;border-radius:3px}
.chart-wrap{background:#fff;border-radius:12px;border:0.5px solid #e0dfd8;padding:20px;margin-bottom:14px;overflow-x:auto}
.node-group{cursor:pointer}
.node-group rect.node-rect{transition:stroke-width .1s}
.node-group:hover rect.node-rect{stroke-width:1.5!important}
.node-group.active rect.node-rect{stroke-width:2!important}
.detail-panel{background:#fff;border-radius:12px;border:0.5px solid #e0dfd8;overflow:hidden;display:none;margin-bottom:14px}
.detail-panel.open{display:block}
.detail-hdr{padding:14px 20px;border-bottom:0.5px solid #e0dfd8;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.detail-title{font-size:17px;font-weight:600}
.detail-sub{font-size:13px;color:#888780;margin-top:2px}
.chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
.kpi-row{display:flex;gap:10px;padding:12px 20px;border-bottom:0.5px solid #e0dfd8;flex-wrap:wrap}
.kpi{background:#fafaf8;border-radius:8px;padding:10px 14px;min-width:110px}
.kpi-l{font-size:11px;color:#888780;margin-bottom:2px}
.kpi-v{font-size:19px;font-weight:600;color:#1a1a18}
.people-section{padding:16px 20px}
.level-block{margin-bottom:18px}
.level-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.level-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:6px;min-width:38px;text-align:center}
.level-name{font-size:13px;color:#888780}
.level-count{font-size:12px;color:#b4b2a9;margin-left:auto}
.add-person-btn{font-size:12px;color:#534AB7;cursor:pointer;padding:2px 8px;border-radius:6px;border:0.5px dashed #534AB7;background:transparent}
.add-person-btn:hover{background:#EEEDFE}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.person-card{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:8px;border:0.5px solid #e0dfd8;background:#fff;position:relative}
.person-card:hover{border-color:#d3d1c7}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.person-info{flex:1;min-width:0}
.person-name{font-size:13px;font-weight:500;color:#1a1a18}
.person-role{font-size:11px;color:#888780;margin-top:1px}
.person-sub{font-size:11px;color:#b4b2a9;margin-top:1px}
.card-btns{display:none;gap:3px;position:absolute;top:6px;right:6px}
.person-card:hover .card-btns{display:flex}
.icon-btn{width:22px;height:22px;border-radius:5px;border:0.5px solid #d3d1c7;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#888780}
.icon-btn:hover{background:#f5f5f0}
.icon-btn.del:hover{background:#fcebeb;color:#a32d2d;border-color:#e24b4a}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#fff;border-radius:14px;border:0.5px solid #e0dfd8;padding:22px;width:100%;max-width:420px}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{font-size:12px;color:#888780;display:block;margin-bottom:4px;font-weight:500}
.field input,.field select{width:100%;padding:7px 11px;font-size:13px;border:0.5px solid #d3d1c7;border-radius:8px;background:#fafaf8;color:#1a1a18;outline:none}
.field input:focus,.field select:focus{border-color:#534AB7;background:#fff}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.saved-tip{font-size:12px;color:#0F6E56;background:#E1F5EE;padding:3px 10px;border-radius:6px;opacity:0;transition:opacity .3s}
.saved-tip.show{opacity:1}
.close-btn{width:28px;height:28px;border-radius:7px;border:0.5px solid #d3d1c7;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#888780}
.close-btn:hover{background:#f5f5f0}
@media(max-width:600px){.people-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

<div class="page">
<div class="hdr">
  <div class="hdr-left">
    <div class="logo">云</div>
    <div>
      <div class="hdr-title">云蝠控股 · 组织架构图</div>
      <div class="hdr-sub">点击部门节点 · 查看职级分布 · 在线编辑人员</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="saved-tip" id="saved-tip">已保存</span>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#534AB7"></div>核心/总部</div>
      <div class="leg-item"><div class="leg-dot" style="background:#0F6E56"></div>职能</div>
      <div class="leg-item"><div class="leg-dot" style="background:#854F0B"></div>研发</div>
    </div>
  </div>
</div>

<div class="chart-wrap">
  <svg id="org-svg" width="100%" viewBox="0 0 1060 310"></svg>
</div>

<div class="detail-panel" id="detail-panel">

    <div>

      <div class="detail-sub" id="d-sub"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

      <button class="btn sm primary" onclick="openAddPerson()">+ 添加人员</button>
      <div class="close-btn" onclick="closeDetail()">✕</div>
    </div>
  </div>
  <div class="kpi-row" id="d-kpis"></div>
  <div class="people-section" id="d-people"></div>
</div>
</div>

<div class="overlay" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-title">添加人员</h3>
    <div class="field"><label>姓名</label><input id="f-name" placeholder="请输入姓名"/></div>
    <div class="field"><label>职务/岗位</label><input id="f-role" placeholder="如：财务总监"/></div>
    <div class="field"><label>职级</label>
      <select id="f-level">
        <option value="M1">M1 — 董事长/总经理</option>
        <option value="M2">M2 — 副总</option>
        <option value="M3">M3 — 总监</option>
        <option value="M4">M4 — 部门经理/总监</option>
        <option value="M5">M5 — 部门经理</option>
        <option value="M6">M6 — 部门主管</option>
        <option value="M7" selected>M7 — 高级专员</option>
        <option value="M8">M8 — 专员</option>
        <option value="-">无职级（一线员工）</option>
      </select>
    </div>
    <div class="field"><label>所属二级部门</label><input id="f-sub" placeholder="如：财务部（可留空）"/></div>
    <div class="modal-btns">
      <button class="btn primary" onclick="confirmPerson()">确认</button>
      <button class="btn" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

let DATA=JSON.parse(localStorage.getItem('yunfu_v4')||'null')||DEFAULT_DATA;
let activeId=null;
let editPid=null;
let editDid=null;
let pidCounter=9000;
const TOTAL=754;

const AC=['#EEEDFE','#E1F5EE','#FAEEDA','#FAECE7','#E6F1FB','#EAF3DE'];
const ATC=['#3C3489','#085041','#633806','#712B13','#0C447C','#27500A'];
function ac(i){return AC[Math.abs(i)%AC.length];}
function atc(i){return ATC[Math.abs(i)%ATC.length];}
function save(){localStorage.setItem('yunfu_v4',JSON.stringify(DATA));const t=document.getElementById('saved-tip');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

function drawSVG(){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.getElementById('org-svg');
  svg.innerHTML='';
  function mkRect(x,y,w,h,rx2,fill,stroke,sw){
    const r=document.createElementNS(ns,'rect');
    [['x',x],['y',y],['width',w],['height',h],['rx',rx2],['fill',fill],['stroke',stroke],['stroke-width',sw||'0.5']].forEach(([a,v])=>r.setAttribute(a,v));
    return r;
  }
  function mkText(x,y,txt,fs,fw,fill){
    const t=document.createElementNS(ns,'text');
    [['x',x],['y',y],['text-anchor','middle'],['font-size',fs],['font-weight',fw||'400'],['fill',fill],['font-family','-apple-system,sans-serif']].forEach(([a,v])=>t.setAttribute(a,v));
    t.textContent=txt;return t;
  }
  function mkLine(x1,y1,x2,y2){
    const l=document.createElementNS(ns,'line');
    [['x1',x1],['y1',y1],['x2',x2],['y2',y2],['stroke','#d3d1c7'],['stroke-width','1']].forEach(([a,v])=>l.setAttribute(a,v));
    return l;
  }
  function mkPath(d){
    const p=document.createElementNS(ns,'path');
    p.setAttribute('d',d);p.setAttribute('fill','none');p.setAttribute('stroke','#d3d1c7');p.setAttribute('stroke-width','1');
    return p;
  }
  const rx=470,ry=18,rw=120,rh=46;
  const rootG=document.createElementNS(ns,'g');
  rootG.appendChild(mkRect(rx,ry,rw,rh,'9','#EEEDFE','#534AB7','1'));
  rootG.appendChild(mkText(rx+rw/2,ry+17,'云蝠控股','13','600','#3C3489'));
  rootG.appendChild(mkText(rx+rw/2,ry+33,TOTAL+'人','11','400','#534AB7'));
  svg.appendChild(rootG);
  const NW=90,NH=46,NY1=158,NY2=228;
  const row1=DATA.slice(0,6);
  const row2=DATA.slice(6);
  const r1xs=[20,115,210,305,400,495];
  const r2xs=[590,685,780,875,970];
  const rootMX=rx+rw/2;
  if(row1.length>0){
    svg.appendChild(mkLine(r1xs[0]+NW/2,NY1-20,r1xs[Math.min(row1.length-1,5)]+NW/2,NY1-20));
    svg.appendChild(mkLine(rootMX,ry+rh,rootMX,NY1-20));
  }
  if(row2.length>0){
    const r2start=r2xs[0]+NW/2;
    const r2end=r2xs[Math.min(row2.length-1,4)]+NW/2;
    const r2mid=(r2start+r2end)/2;
    svg.appendChild(mkLine(r2start,NY2-20,r2end,NY2-20));
    svg.appendChild(mkPath(`M${rootMX},${ry+rh} C${rootMX},${NY2-50} ${r2mid},${NY2-50} ${r2mid},${NY2-20}`));
  }
  row1.forEach((d,i)=>{
    const x=r1xs[i],cx=x+NW/2;
    svg.appendChild(mkLine(cx,NY1-20,cx,NY1));
    const g=document.createElementNS(ns,'g');
    g.setAttribute('class','node-group');
    g.setAttribute('data-id',d.id);
    const r=mkRect(x,NY1,NW,NH,'8',d.bg,d.bar,'0.5');
    r.setAttribute('class','node-rect');
    g.appendChild(r);
    g.appendChild(mkText(x+NW/2,NY1+17,d.name,'12','500',d.tc));
    g.appendChild(mkText(x+NW/2,NY1+33,d.count+'人','10','400',d.bar));
    g.addEventListener('click',()=>showDetail(d.id));
    svg.appendChild(g);
  });
  row2.forEach((d,i)=>{
    const x=r2xs[i],cx=x+NW/2;
    svg.appendChild(mkLine(cx,NY2-20,cx,NY2));
    const g=document.createElementNS(ns,'g');
    g.setAttribute('class','node-group');
    g.setAttribute('data-id',d.id);
    const r=mkRect(x,NY2,NW,NH,'8',d.bg,d.bar,'0.5');
    r.setAttribute('class','node-rect');
    g.appendChild(r);
    g.appendChild(mkText(x+NW/2,NY2+17,d.name,'12','500',d.tc));
    g.appendChild(mkText(x+NW/2,NY2+33,d.count+'人','10','400',d.bar));
    g.addEventListener('click',()=>showDetail(d.id));
    svg.appendChild(g);
  });
}

function showDetail(id){
  activeId=id;
  const d=DATA.find(x=>x.id===id);
  if(!d)return;
  document.querySelectorAll('.node-group').forEach(g=>{
    const active=g.dataset.id===id;
    g.classList.toggle('active',active);
    const r=g.querySelector('rect.node-rect');
    if(r)r.setAttribute('stroke-width',active?'2':'0.5');
  });
  const rank=[...DATA].sort((a,b)=>b.count-a.count).findIndex(x=>x.id===id)+1;
  const mgrs=d.people.filter(p=>['M1','M2','M3','M4'].includes(p.level)).length;
  document.getElementById('d-title').textContent=d.name;
  document.getElementById('d-sub').textContent=d.en+(d.note?' · '+d.note:'');
  document.getElementById('d-chips').innerHTML=`<span class="chip" style="background:${d.bg};color:${d.tc}">${d.type}</span><span class="chip" style="background:#f1efe8;color:#5F5E5A;margin-left:5px">规模 #${rank}</span>`;
  document.getElementById('d-kpis').innerHTML=`
    <div class="kpi"><div class="kpi-l">在编人数</div><div class="kpi-v">${d.count}</div></div>
    <div class="kpi"><div class="kpi-l">占总人数</div><div class="kpi-v">${(d.count/TOTAL*100).toFixed(1)}%</div></div>
    <div class="kpi"><div class="kpi-l">管理层 M1-M4</div><div class="kpi-v">${mgrs}人</div></div>
    <div class="kpi"><div class="kpi-l">录入人员</div><div class="kpi-v">${d.people.length}</div></div>`;
  renderPeople(d);
  const panel=document.getElementById('detail-panel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderPeople(d){
  const grouped={};
  LEVEL_ORDER.forEach(l=>grouped[l]=[]);
  d.people.forEach(p=>{const l=p.level||'-';if(!grouped[l])grouped[l]=[];grouped[l].push(p);});
  let html='';
  LEVEL_ORDER.forEach(l=>{
    const ppl=grouped[l];
    if(!ppl||ppl.length===0)return;
    const m=LEVEL_META[l]||LEVEL_META['-'];
    html+=`<div class="level-block">
      <div class="level-hdr">
        <span class="level-badge" style="background:${m.bg};color:${m.tc}">${m.label}</span>
        <span class="level-name">${m.name}</span>
        <span class="level-count">${ppl.length}人</span>
      </div>
      <div class="people-grid">
        ${ppl.map((p,pi)=>`
          <div class="person-card">
            <div class="avatar" style="background:${ac(pi)};color:${atc(pi)}">${p.name[0]||'?'}</div>
            <div class="person-info">
              <div class="person-name">${p.name}</div>
              <div class="person-role">${p.role}</div>
              ${p.sub?`<div class="person-sub">${p.sub}</div>`:''}
            </div>
            <div class="card-btns">
              <div class="icon-btn" onclick="openEditPerson('${d.id}','${p.id}')" title="编辑">✎</div>
              <div class="icon-btn del" onclick="deletePerson('${d.id}','${p.id}')" title="删除">✕</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('d-people').innerHTML=html;
}

function openAddPerson(){
  if(!activeId)return;
  editPid=null;
  editDid=activeId;
  document.getElementById('modal-title').textContent='添加人员';
  document.getElementById('f-name').value='';
  document.getElementById('f-role').value='';
  document.getElementById('f-level').value='M7';
  document.getElementById('f-sub').value='';
  document.getElementById('modal').style.display='flex';
}

function openEditPerson(did,pid){
  const d=DATA.find(x=>x.id===did);
  const p=d&&d.people.find(x=>x.id===pid);
  if(!p)return;
  editDid=did;editPid=pid;
  document.getElementById('modal-title').textContent='编辑人员';
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-role').value=p.role;
  document.getElementById('f-level').value=p.level||'-';
  document.getElementById('f-sub').value=p.sub||'';
  document.getElementById('modal').style.display='flex';
}

function confirmPerson(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('请输入姓名');return;}
  const d=DATA.find(x=>x.id===editDid);
  if(!d)return;
  if(editPid){
    const p=d.people.find(x=>x.id===editPid);
    if(p){p.name=name;p.role=document.getElementById('f-role').value.trim();p.level=document.getElementById('f-level').value;p.sub=document.getElementById('f-sub').value.trim();}
  } else {
    d.people.push({id:'p'+(pidCounter++),name,role:document.getElementById('f-role').value.trim(),level:document.getElementById('f-level').value,sub:document.getElementById('f-sub').value.trim()});
  }
  save();closeModal();showDetail(editDid);
}

function deletePerson(did,pid){
  const d=DATA.find(x=>x.id===did);
  if(!d)return;
  const p=d.people.find(x=>x.id===pid);
  if(!p||!confirm(`确定删除「${p.name}」吗？`))return;
  d.people=d.people.filter(x=>x.id!==pid);
  save();showDetail(did);
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.node-group').forEach(g=>{g.classList.remove('active');const r=g.querySelector('rect.node-rect');if(r)r.setAttribute('stroke-width','0.5');});
  activeId=null;
}

function closeModal(){document.getElementById('modal').style.display='none';}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

drawSVG();
</script>
